<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navis AI — Cas d'usage</title>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --black: #0a0a0a;
            --white: #f5f5f0;
            --gray-mid: #888880;
            --nav-bg: rgba(245,245,240,0.97);
            --nav-border: rgba(10,10,10,0.08);
            --grid-line: rgba(10,10,10,0.04);
        }

        html.dark {
            --black: #f5f5f0;
            --white: #0a0a0a;
            --gray-mid: #777770;
            --nav-bg: rgba(10,10,10,0.98);
            --nav-border: rgba(245,245,240,0.08);
            --grid-line: rgba(245,245,240,0.04);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Georgia', serif;
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
            transition: background-color 0.45s ease, color 0.45s ease;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; width: 100%;
            z-index: 100;
            padding: 1.5rem 5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--nav-border);
            transition: padding 0.3s ease, background-color 0.45s ease, border-color 0.45s ease;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--black);
            transition: color 0.45s ease;
        }

        .nav-logo-img { width: 44px; height: 44px; display: block; }

        html:not(.dark) .nav-logo-img { content: url('navis-logo-light.png'); }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-right { display: flex; align-items: center; gap: 2rem; }

        .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }

        .nav-links a {
            text-decoration: none;
            color: var(--black);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 3px;
            font-family: 'Arial', sans-serif;
            transition: color 0.45s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: var(--black);
            transition: width 0.3s ease, background-color 0.45s ease;
        }

        .nav-links a:hover::after { width: 100%; }

        .nav-links a.active::after { width: 100%; }

        .nav-cta {
            background: var(--black) !important;
            color: var(--white) !important;
            padding: 0.55rem 1.4rem;
            border: 1.5px solid var(--black) !important;
            transition: background 0.3s, color 0.3s, border-color 0.45s !important;
        }

        .nav-cta:hover { background: transparent !important; color: var(--black) !important; }
        .nav-cta::after { display: none !important; }

        .theme-toggle {
            background: none;
            border: 1.5px solid var(--black);
            color: var(--black);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: background 0.3s, color 0.3s, border-color 0.45s;
        }

        .theme-toggle:hover { background: var(--black); color: var(--white); }

        .icon-moon { display: none; }
        html.dark .icon-sun  { display: none; }
        html.dark .icon-moon { display: block; }

        .lang-toggle {
            background: none;
            border: 1.5px solid var(--black);
            color: var(--black);
            height: 36px;
            padding: 0 0.75rem;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            flex-shrink: 0;
            transition: background 0.3s, color 0.3s, border-color 0.45s;
        }

        .lang-toggle:hover { background: var(--black); color: var(--white); }
        .lang-toggle .show-fr { display: none; }
        html.fr .lang-toggle .show-en { display: none; }
        html.fr .lang-toggle .show-fr { display: inline; }

        /* ─── COMING SOON ─── */
        .coming-soon {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10rem 2rem 5rem;
            position: relative;
            overflow: hidden;
            background: var(--white);
            transition: background-color 0.45s ease;
        }

        .cs-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 72px 72px;
        }

        .cs-content { position: relative; z-index: 1; max-width: 720px; }

        .cs-eyebrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-family: 'Arial', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gray-mid);
            margin-bottom: 2.5rem;
        }

        .cs-eyebrow::before, .cs-eyebrow::after {
            content: '';
            width: 50px; height: 1px;
            background: var(--gray-mid);
        }

        .cs-label {
            font-family: 'Arial', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gray-mid);
            margin-bottom: 1.5rem;
        }

        .cs-title {
            font-size: clamp(3rem, 8vw, 6.5rem);
            line-height: 0.95;
            letter-spacing: -0.03em;
            font-weight: 900;
            margin-bottom: 2rem;
        }

        .cs-body {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--gray-mid);
            margin-bottom: 3rem;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        .cs-divider {
            width: 36px; height: 2px;
            background: var(--black);
            margin: 0 auto 3rem;
            transition: background-color 0.45s ease;
        }

        .btn {
            font-family: 'Arial', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            text-decoration: none;
            display: inline-block;
            border: 1.5px solid var(--black);
            transition: background 0.3s, color 0.3s, border-color 0.45s;
            cursor: pointer;
        }

        .btn-light { background: transparent; color: var(--black); }
        .btn-light:hover { background: var(--black); color: var(--white); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            nav { padding: 1.2rem 1.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <img src="navis-logo.png" class="nav-logo-img" alt="Navis AI">
        <span class="nav-brand">Navis AI</span>
    </a>
    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="index.html#services" data-i18n="nav.services">Services</a></li>
            <li><a href="index.html#about" data-i18n="nav.about">About</a></li>
            <li><a href="index.html#process" data-i18n="nav.process">Process</a></li>
            <li><a href="#" class="active" data-i18n="nav.usecases">Use Cases</a></li>
            <li><a href="index.html#contact" class="nav-cta" data-i18n="nav.cta">Set Sail &rarr;</a></li>
        </ul>
        <button class="lang-toggle" id="langToggle" aria-label="Changer de langue">
            <span class="show-en">FR</span>
            <span class="show-fr">EN</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="4.5"/>
                <line x1="12" y1="2"    x2="12" y2="4.5"/>
                <line x1="12" y1="19.5" x2="12" y2="22"/>
                <line x1="2"  y1="12"   x2="4.5" y2="12"/>
                <line x1="19.5" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="4.93" x2="6.7"  y2="6.7"/>
                <line x1="17.3" y1="17.3" x2="19.07" y2="19.07"/>
                <line x1="4.93" y1="19.07" x2="6.7"  y2="17.3"/>
                <line x1="17.3" y1="6.7"   x2="19.07" y2="4.93"/>
            </svg>
            <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</nav>

<section class="coming-soon">
    <div class="cs-grid"></div>
    <div class="cs-content">
        <div class="cs-eyebrow" data-i18n="cs.eyebrow">Navis AI &middot; Use Cases</div>
        <p class="cs-label" data-i18n="cs.label">Cas d'usage</p>
        <h1 class="cs-title" data-i18n="cs.title">À venir.</h1>
        <div class="cs-divider"></div>
        <p class="cs-body" data-i18n="cs.body">Nous mettons actuellement à jour cette page avec nos études de cas, nos retours terrain et nos contributions open source. Revenez bientôt.</p>
        <a href="index.html" class="btn btn-light" data-i18n="cs.back">&larr; Retour à l'accueil</a>
    </div>
</section>

<script>
    // ─── Dark mode ───
    const toggle = document.getElementById('themeToggle');
    const html   = document.documentElement;

    if (localStorage.getItem('navis-theme') === 'dark') html.classList.add('dark');

    toggle.addEventListener('click', () => {
        html.classList.toggle('dark');
        localStorage.setItem('navis-theme', html.classList.contains('dark') ? 'dark' : 'light');
    });

    // ─── i18n ───
    const T = {
        en: {
            'nav.services':  'Services',
            'nav.about':     'About',
            'nav.process':   'Process',
            'nav.usecases':  'Use Cases',
            'nav.cta':       'Set Sail &rarr;',
            'cs.eyebrow':    'Navis AI &middot; Use Cases',
            'cs.label':      'Use Cases',
            'cs.title':      'Coming soon.',
            'cs.body':       'We are currently updating this page with case studies, field insights and open source contributions. Check back soon.',
            'cs.back':       '&larr; Back to home'
        },
        fr: {
            'nav.services':  'Services',
            'nav.about':     'À propos',
            'nav.process':   'Méthode',
            'nav.usecases':  'Cas d\'usage',
            'nav.cta':       'Appareiller &rarr;',
            'cs.eyebrow':    'Navis AI &middot; Cas d\'usage',
            'cs.label':      'Cas d\'usage',
            'cs.title':      'À venir.',
            'cs.body':       'Nous mettons actuellement à jour cette page avec nos études de cas, nos retours terrain et nos contributions open source. Revenez bientôt.',
            'cs.back':       '&larr; Retour à l\'accueil'
        }
    };

    function setLang(code) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const v = T[code]?.[el.dataset.i18n];
            if (v !== undefined) el.innerHTML = v;
        });
        document.documentElement.lang = code;
        document.documentElement.classList.toggle('fr', code === 'fr');
        localStorage.setItem('navis-lang', code);
    }

    const savedLang = localStorage.getItem('navis-lang');
    setLang(savedLang || 'fr');

    document.getElementById('langToggle').addEventListener('click', () => {
        setLang(document.documentElement.classList.contains('fr') ? 'en' : 'fr');
    });
</script>

</body>
</html>
